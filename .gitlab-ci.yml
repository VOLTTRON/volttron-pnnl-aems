# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Nodejs.gitlab-ci.yml

# Official framework image. Look for the different tagged releases at:
# https://hub.docker.com/r/library/node/tags/
image: node:22.14.0

variables:
  BASE_DIR: "."
  POSTGRES_DB: skeleton
  POSTGRES_USER: develop
  POSTGRES_PASSWORD: password
  DATABASE_HOST: postgis-postgis
  DOCKER_BUILDKIT: 1
  CLEAN_BUILD: "false"
  TAG_VERSION: "$CI_COMMIT_BRANCH$CI_COMMIT_TAG"

# Cache node_modules and dist between build/test jobs so test.sh can run lint
# and type-checks without a fresh install. build.sh is responsible for clearing
# the portal: symlinks (@local/prisma, @local/common, @prisma/client) before
# each `yarn install` — otherwise Yarn 4 fails with EEXIST when it tries to
# recreate a symlink that's already present from the restored cache.
#
# The key is explicit + versioned. Bump the version whenever `paths` changes,
# otherwise GitLab keeps restoring the previous archive and its old contents.
cache:
  key: "yarn-v4"
  paths:
    - "**/node_modules/"
    - "**/dist/"

stages:
  - build
  - test
  - publish

build:
  stage: build
  variables:
    YARN_ENABLE_IMMUTABLE_INSTALLS: false
  script:
    - corepack enable
    - chmod +x ${BASE_DIR}/build.sh
    - ${BASE_DIR}/build.sh

test:
  stage: test
  variables:
    YARN_ENABLE_IMMUTABLE_INSTALLS: false
    SKIP_MIGRATIONS: "true"
  services:
    - postgis/postgis:16-3.4
  script:
    - corepack enable
    - chmod +x ${BASE_DIR}/build.sh ${BASE_DIR}/test.sh
    - ${BASE_DIR}/build.sh
    - ${BASE_DIR}/test.sh
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: "**/coverage/cobertura-coverage.xml"

publish_init:
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  stage: publish
  script:
    - env
    - cd ${BASE_DIR}/prisma
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --tag=$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/init:$TAG_VERSION .
    - docker push $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/init:$TAG_VERSION

publish_server:
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  stage: publish
  script:
    - env
    - cd ${BASE_DIR}
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --file=server/Dockerfile --tag=$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/server:$TAG_VERSION .
    - docker push $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/server:$TAG_VERSION

publish_client:
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_TAG
  stage: publish
  script:
    - env
    - cd ${BASE_DIR}
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --file=client/Dockerfile --tag=$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/client:$TAG_VERSION .
    - docker push $CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/client:$TAG_VERSION
