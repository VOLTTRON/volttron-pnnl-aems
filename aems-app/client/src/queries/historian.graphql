query HistorianReplicationInfo {
  historianReplicationInfo
}

query HistorianTimeSeries(
  $campus: String
  $building: String
  $unit: String
  $startTime: DateTime!
  $endTime: DateTime!
  $topicPatterns: [String!]!
) {
  historianTimeSeries(
    campus: $campus
    building: $building
    unit: $unit
    startTime: $startTime
    endTime: $endTime
    topicPatterns: $topicPatterns
  )
}

query HistorianCurrentValues(
  $campus: String
