}

query HistorianAggregated(
  $campus: String
  $building: String
  $unit: String
  $startTime: DateTime!
  $endTime: DateTime!
  $interval: String!
  $aggregation: AggregationType!
  $topicPattern: String!
) {
  historianAggregated(
    campus: $campus
