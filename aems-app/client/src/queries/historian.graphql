# Multi-system queries - for comparing multiple systems in a building
query HistorianMultiSystemUnit(
  $campus: String!
  $building: String!
  $systems: [String!]!
  $metric: UnitMetric!
  $startTime: DateTime!
  $endTime: DateTime!
  $interval: String
) {
  historianMultiSystemUnit(
    campus: $campus
    building: $building
    systems: $systems
    metric: $metric
    startTime: $startTime
    endTime: $endTime
    interval: $interval
  )
}

