query HistorianReplicationInfo {
  historianReplicationInfo
}

# Unit metric queries - for individual system data
query HistorianUnitTimeSeries(
  $campus: String!
  $building: String!
  $system: String!
  $metric: UnitMetric!
  $startTime: DateTime!
  $endTime: DateTime!
) {
  historianUnitTimeSeries(
    campus: $campus
    building: $building
    system: $system
    metric: $metric
    startTime: $startTime
    endTime: $endTime
  )
}

query HistorianUnitCurrentValue(
  $campus: String!
  $building: String!
  $system: String!
  $metric: UnitMetric!
) {
  historianUnitCurrentValue(
    campus: $campus
    building: $building
    system: $system
    metric: $metric
  )
}

query HistorianUnitAggregated(
  $campus: String!
  $building: String!
  $system: String!
  $metric: UnitMetric!
  $startTime: DateTime!
  $endTime: DateTime!
  $interval: String!
