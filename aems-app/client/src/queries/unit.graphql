query ReadUnitInfo($where: UnitUniqueFilter!) {
  readUnit(where: $where) {
    id
    name
    campus
    building
    system
    timezone
    label
    stage
    message
    createdAt
    updatedAt
  }
}

query ReadUnitsInfo($where: UnitFilter, $paging: PagingInput, $orderBy: [UnitOrderBy!], $distinct: [UnitFields!]) {
  readUnits(where: $where, paging: $paging, orderBy: $orderBy, distinct: $distinct) {
    id
    name
    campus
    building
    system
    timezone
    label
    stage
    message
    createdAt
    updatedAt
  }
}

query ReadUnit($where: UnitUniqueFilter!) {
  readUnit(where: $where) {
    id
    name
    campus
    building
    system
    timezone
    label
    stage
    message
    correlation
    coolingCapacity
    compressors
    coolingLockout
    optimalStartLockout
    optimalStartDeviation
    earliestStart
    latestStart
    zoneLocation
    zoneMass
    zoneOrientation
    zoneBuilding
    heatPump
    heatPumpBackup
    economizer
    heatPumpLockout
    coolingPeakOffset
    heatingPeakOffset
    peakLoadExclude
    economizerSetpoint
    occupancyDetection
    configurationId
    controlId
    locationId
    createdAt
    updatedAt
    configuration {
      id
      label
      stage
      message
      correlation
      setpoint {
        id
        label
        setpoint
        deadband
        overrideSetpoint
        overrideDeadband
        heating
        cooling
        standbyTime
        standbyOffset
      }
      holidays {
        id
        type
        label
        month
        day
        observance
      }
      occupancies {
        id
        label
        date
        schedule {
          id
          label
          startTime
          endTime
          occupied
          override
          overridePreStartTime
          overridePreEndTime
          overridePostStartTime
          overridePostEndTime
        }
      }
      mondaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      tuesdaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      wednesdaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      thursdaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      fridaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      saturdaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      sundaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
      holidaySchedule {
        id
        label
        startTime
        endTime
        occupied
        override
        overridePreStartTime
        overridePreEndTime
        overridePostStartTime
        overridePostEndTime
      }
    }
    location {
      id
      name
      latitude
      longitude
    }
  }
}

