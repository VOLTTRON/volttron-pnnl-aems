packageExtensions:
  # @deck.gl/arcgis is an optional ArcGIS integration bundled with deck.gl;
  # @arcgis/core is not marked optional in its peer deps but we don't use it.
  "@deck.gl/arcgis@*":
    peerDependenciesMeta:
      "@arcgis/core":
        optional: true

logFilters:
  # @blueprintjs/datetime@5 declares react/react-dom/@types/react peers as
  # "^16.14.41 || 17" only; Blueprint v5 supports React 18 but never updated
  # these ranges. packageExtensions cannot override existing peer dep ranges,
  # only add new ones, so we suppress the known-false-positive warnings here.
  - text: "@blueprintjs/datetime (via @blueprintjs/datetime2)"
    code: YN0060
    level: discard
  # @typescript-eslint@8.22.0 (pulled in transitively by eslint-config-next
  # @15.2.2) caps typescript at <5.8.0. The 8.22.x packages work fine with
  # TS 5.8.x; the cap is overly conservative and was widened in 8.24+.
  - text: "@typescript-eslint/eslint-plugin (via eslint-config-next)"
    code: YN0060
    level: discard

compressionLevel: mixed
enableGlobalCache: true
nodeLinker: node-modules

# Registry configuration with fallbacks
npmRegistryServer: "https://registry.npmjs.org"
npmAlwaysAuth: false

# Network optimization settings
httpTimeout: 60000
networkConcurrency: 8

# Retry configuration for VPN scenarios
httpRetry: 3

# Connection optimization
httpProxy: ${HTTP_PROXY-}
httpsProxy: ${HTTPS_PROXY-}

# Compression and caching
enableNetwork: true
enableOfflineMode: false

# Performance optimizations
preferInteractive: false
progressBarStyle: patrick
