# Every declared secret uses a `${..._SOURCE:-./secrets/.placeholder}`
# indirection so that when `secrets.sh` hasn't been run and the real
# `./secrets/foo.txt` files don't exist, compose falls through to the
# tracked empty `.placeholder` file instead of auto-creating each source
# path as a directory (a footgun that corrupts every secret mount).
# Empty placeholders satisfy `-f` / `-r` file tests but return "" on
# read, and every downstream consumer either uses `-s` (non-empty) or
# checks the read value for truthiness before using it. `secrets.sh`
# overrides the indirection by emitting per-secret `_SOURCE=` lines into
# `docker/.env.secrets.docker`.
secrets:
  session_secret:
    file: ${SESSION_SECRET_SOURCE:-./secrets/.placeholder}
  jwt_secret:
    file: ${JWT_SECRET_SOURCE:-./secrets/.placeholder}
  database_password:
    file: ${DATABASE_PASSWORD_SOURCE:-./secrets/.placeholder}
  redis_password:
    file: ${REDIS_PASSWORD_SOURCE:-./secrets/.placeholder}
  keycloak_client_secret:
    file: ${KEYCLOAK_CLIENT_SECRET_SOURCE:-./secrets/.placeholder}
  keycloak_admin_password:
    file: ${KEYCLOAK_ADMIN_PASSWORD_SOURCE:-./secrets/.placeholder}
  keycloak_database_password:
    file: ${KEYCLOAK_DATABASE_PASSWORD_SOURCE:-./secrets/.placeholder}
  nominatim_database_password:
    file: ${NOMINATIM_DATABASE_PASSWORD_SOURCE:-./secrets/.placeholder}
  bookstack_session_secret:
    file: ${BOOKSTACK_SESSION_SECRET_SOURCE:-./secrets/.placeholder}
  bookstack_root_password:
    file: ${BOOKSTACK_ROOT_PASSWORD_SOURCE:-./secrets/.placeholder}
  bookstack_database_password:
    file: ${BOOKSTACK_DATABASE_PASSWORD_SOURCE:-./secrets/.placeholder}
  bookstack_keycloak_client_secret:
    file: ${BOOKSTACK_KEYCLOAK_CLIENT_SECRET_SOURCE:-./secrets/.placeholder}
  worker_token:
    file: ${WORKER_TOKEN_SOURCE:-./secrets/.placeholder}

# NOTE: The backup encryption keypair is NOT declared as a docker secret
# because docker secrets require the source file to exist before compose
# start. The backup sidecar auto-generates the keypair on first boot by
# writing into the ./secrets/backup/ directory (mounted into the container
# at /host-secrets). See docker/backup/init-keys.sh.

services:
  # Proxy that can be configured for HTTP or HTTPS
  proxy:
    command:
      - --log.level=INFO
      - --api=true
      - --api.dashboard=true
      - --api.basepath=/traefik
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certresolver=${CERT_RESOLVER}
      - --entrypoints.historian.address=:${HISTORIAN_REPLICATION_PORT}
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/letsencrypt.json
    container_name: ${COMPOSE_PROJECT_NAME}-proxy
    depends_on:
      certs:
        condition: service_completed_successfully
    hostname: proxy
    image: traefik:v3.6.2
    labels:
      - traefik.tls.stores.default.defaultgeneratedcert.resolver=${CERT_RESOLVER}
      - traefik.tls.stores.default.defaultgeneratedcert.domain.main=${APP_HOSTNAME}
      - traefik.tls.stores.default.defaultgeneratedcert.domain.sans=*.${APP_HOSTNAME}
      - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https,wss
    ports:
      - 80:80
      - 443:443
      - ${HISTORIAN_REPLICATION_PORT}:${HISTORIAN_REPLICATION_PORT}
    profiles:
      - proxy
    restart: unless-stopped
    user: root:root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - certs-data:/etc/certs/:ro
      - acme-data:/etc/traefik/acme/
      - ./proxy/certs-traefik.yml:/etc/traefik/dynamic/certs-traefik.yml
      - ./proxy/historian-tcp.yml:/etc/traefik/dynamic/historian-tcp.yml
      - ./proxy/volttron-transport.yml:/etc/traefik/dynamic/volttron-transport.yml
      - ./proxy/dynamic.yml:/etc/traefik/dynamic.yml:ro

  # Application that hosts static files and API
  client:
    build:
      context: ../
      dockerfile: ./client/Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED}
    container_name: ${COMPOSE_PROJECT_NAME}-client
    depends_on:
      init:
        condition: service_completed_successfully
      database:
        condition: service_started
    # deploy:
    #   mode: replicated
    #   endpoint_mode: vip
    #   replicas: 2
    env_file:
      - .env.client
    secrets:
      - database_password
      - redis_password
    healthcheck:
      test: "curl --fail http://localhost:3000 || exit 1"
      interval: 10s
      timeout: 10s
      retries: 120
    hostname: client
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/client:${TAG}
    labels:
      - traefik.enable=true
      - traefik.http.services.client.loadbalancer.server.port=3000
      - traefik.http.middlewares.client-security.headers.browserXssFilter=true
      - traefik.http.middlewares.client-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.client-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.client-security.headers.frameDeny=true
      - traefik.http.middlewares.client-security.headers.referrerPolicy=same-origin
      - traefik.http.middlewares.client-security.headers.sslRedirect=true
      - traefik.http.middlewares.client-security.headers.stsSeconds=31536000
      - traefik.http.routers.client-http.entrypoints=web
      - traefik.http.routers.client-http.rule=Host(`${APP_HOSTNAME}`)
      - traefik.http.routers.client-http.middlewares=client-https
      - traefik.http.middlewares.client-https.redirectscheme.scheme=https
      - traefik.http.routers.client.entrypoints=websecure
      - traefik.http.routers.client.rule=Host(`${APP_HOSTNAME}`) && !PathPrefix(`/authjs`) && !PathPrefix(`/graphql`) && !PathPrefix(`/api`) && !PathPrefix(`/ext`) && !PathPrefix(`/auth/sso/`)
      - traefik.http.routers.client.middlewares=client-security
      - traefik.http.routers.client.priority=1
      - traefik.http.routers.client.tls=true
      - traefik.http.routers.client.tls.certresolver=${CERT_RESOLVER}
    read_only: true
    restart: unless-stopped
    tmpfs:
      - /tmp
    volumes:
      - client-cache:/app/.next/cache

  # Runs application backend server
  server:
    build:
      context: ../
      dockerfile: ./server/Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED}
    container_name: ${COMPOSE_PROJECT_NAME}-server
    depends_on:
      init:
        condition: service_completed_successfully
      grafana-setup:
        condition: service_completed_successfully
        required: false
      database:
        condition: service_started
    # deploy:
    #   mode: replicated
    #   endpoint_mode: vip
    #   replicas: 2
    env_file:
      - .env.server
    secrets:
      - session_secret
      - jwt_secret
      - database_password
      - redis_password
      - keycloak_client_secret
      - keycloak_admin_password
      - worker_token
    healthcheck:
      test: "curl --fail -X POST http://localhost:3000/graphql -H 'Content-Type: application/json' -d '{\"query\":\"{__typename}\"}'"
      interval: 10s
      timeout: 10s
      retries: 120
    hostname: server
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/server:${TAG}
    labels:
      - traefik.enable=true
      - traefik.http.services.server.loadbalancer.server.port=3000
      - traefik.http.middlewares.server-security.headers.browserXssFilter=true
      - traefik.http.middlewares.server-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.server-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.server-security.headers.frameDeny=true
      - traefik.http.middlewares.server-security.headers.referrerPolicy=same-origin
      - traefik.http.middlewares.server-security.headers.sslRedirect=true
      - traefik.http.middlewares.server-security.headers.stsSeconds=31536000
      - traefik.http.routers.server-http.entrypoints=web
      - traefik.http.routers.server-http.rule=Host(`${APP_HOSTNAME}`)
      - traefik.http.routers.server-http.middlewares=server-https
      - traefik.http.middlewares.server-https.redirectscheme.scheme=https
      - traefik.http.routers.server.entrypoints=websecure
      - traefik.http.routers.server.rule=Host(`${APP_HOSTNAME}`) && (PathPrefix(`/authjs`) || PathPrefix(`/graphql`) || PathPrefix(`/api`) || PathPrefix(`/ext`))
      - traefik.http.routers.server.middlewares=server-security
      - traefik.http.routers.server.tls=true
      - traefik.http.routers.server.tls.certresolver=${CERT_RESOLVER}
    read_only: true
    restart: unless-stopped
    tmpfs:
      - /tmp
    environment:
      BACKUP_WORKSPACE: /workspace
      # Env-var fallback for readSecret when the docker secret isn't
      # configured (dev runs without secrets.sh). When the docker secret
      # IS mounted it wins via /run/secrets/worker_token and this is
      # ignored. Harmless when unset.
      WORKER_TOKEN: ${WORKER_TOKEN:-}
      # Forward the compose profiles selected at stack startup so
      # BackupDiscoveryService can auto-exclude services/volumes/paths
      # that belong only to inactive profiles.
      COMPOSE_PROFILES: ${COMPOSE_PROFILES:-}

    volumes:
      - file-upload:/app/upload/
      - certs-data:/certs/:ro
      - grafana-setup:/app/grafana/:ro
      - ./historian/historian-topic-map.json:/app/config/historian-topic-map.json:ro
      - ./fastapi/setup/:/app/volttron/:ro
      # Read-only workspace mount so BackupDiscoveryService can parse
      # docker-compose.yml and scan for .env* files. Only metadata and
      # env-file paths are read; contents are not.
      - ../:/workspace:ro
      - ./secrets/backup:/host-secrets:rw
      # Read/write mount of the local archive directory so
      # BackupArchiveService can stat archives (availability check) and
      # unlink them when an operator requests manual cleanup. Path inside
      # the container matches the sidecar's mount so `finalPath` values
      # recorded at upload time resolve directly.
      - ./backups:/var/lib/backup/archives:rw

  # Runs application services
  services:
    container_name: ${COMPOSE_PROJECT_NAME}-services
    depends_on:
      init:
        condition: service_completed_successfully
      database:
        condition: service_started
      grafana-setup:
        condition: service_completed_successfully
        required: false
    env_file:
      - .env.services
    extra_hosts:
      - "host.docker.internal:host-gateway"
    secrets:
      - session_secret
      - jwt_secret
      - database_password
      - redis_password
      - keycloak_client_secret
      - keycloak_admin_password
      - worker_token
    healthcheck:
      test: "curl --fail -X POST http://localhost:3000/graphql -H 'Content-Type: application/json' -d '{\"query\":\"{__typename}\"}'"
      interval: 10s
      timeout: 10s
      retries: 120
    hostname: services
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/server:${TAG}
    read_only: true
    restart: unless-stopped
    tmpfs:
      - /tmp
    volumes:
      - file-upload:/app/upload/
      - certs-data:/certs/:ro
      - grafana-setup:/app/grafana/:ro
      - ./volttron/setup/:/app/volttron/:ro

    # Runs application seeders
  seeders:
    container_name: ${COMPOSE_PROJECT_NAME}-seeders
    depends_on:
      init:
        condition: service_completed_successfully
      database:
        condition: service_started
    env_file:
      - .env.seeders
    secrets:
      - session_secret
      - jwt_secret
      - database_password
      - redis_password
      - keycloak_client_secret
      - worker_token
    healthcheck:
      test: "curl --fail -X POST http://localhost:3000/graphql -H 'Content-Type: application/json' -d '{\"query\":\"{__typename}\"}'"
      interval: 10s
      timeout: 10s
      retries: 120
    hostname: seeders
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/server:${TAG}
    restart: on-failure:3
    volumes:
      - ./seed/:/app/seed/:ro

  # Runs relational database migrations on startup
  init:
    build:
      context: ../prisma
      dockerfile: ./Dockerfile
      args:
        - TAG=${TAG}
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED}
    container_name: ${COMPOSE_PROJECT_NAME}-init
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env.init
    hostname: init
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/init:${TAG}
    secrets:
      - database_password

  # Creates self-signed TLS certs for localhost and domain
  certs:
    build:
      context: ./certs
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED}
    container_name: ${COMPOSE_PROJECT_NAME}-certs
    env_file:
      - .env.certs
    hostname: certs
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/certs:${TAG}
    volumes:
      - certs-data:/etc/certs/

  # Application relational database
  database:
    build:
      context: ./database
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    cap_add:
      - SYS_NICE
    container_name: ${COMPOSE_PROJECT_NAME}-database
    env_file:
      - .env.database
    environment:
      # `${VAR-fallback}` (no colon) uses the fallback only when VAR is
      # UNSET; a blank-set value sticks. `secrets.sh` writes
      # `POSTGRES_PASSWORD=` (blank) into `docker/.env.secrets.docker`
      # to satisfy the postgres `file_env` "not both set" invariant
      # when the `_FILE` var is active. Without secrets, no override
      # is loaded and this resolves to `DATABASE_PASSWORD` from `.env`.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-${DATABASE_PASSWORD}}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
    secrets:
      - database_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 10s
      retries: 10
    hostname: database
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/database:${TAG}
    restart: unless-stopped
    volumes:
      - database-data:/var/lib/postgresql/data

  # Redis
  redis:
    command: >
      sh -c "
      if [ -s /run/secrets/redis_password ]; then
        redis-server --requirepass $$(cat /run/secrets/redis_password);
      elif [ ! -z \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass $$REDIS_PASSWORD;
      else
        redis-server;
      fi
      "
    container_name: ${COMPOSE_PROJECT_NAME}-redis
    env_file:
      - .env.redis
    hostname: redis
    image: redis:6.2
    secrets:
      - redis_password
    profiles:
      - redis
    restart: unless-stopped

  # Open Street Map Tiles
  maptiles:
    command: ["--port", "80", "--public_url", "/ext/map", "--verbose"]
    container_name: ${COMPOSE_PROJECT_NAME}-maptiles
    hostname: map
    image: maptiler/tileserver-gl:v5.6.0
    profiles:
      - map
    restart: unless-stopped
    volumes:
      - ./map/:/data/

  # Nominatim container for geocoding
  nominatim:
    container_name: ${COMPOSE_PROJECT_NAME}-nominatim
    env_file:
      - .env.nominatim
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-${NOMINATIM_DATABASE_PASSWORD}}
      POSTGRES_PASSWORD_FILE: ${NOMINATIM_POSTGRES_PASSWORD_FILE:-}
    secrets:
      - nominatim_database_password
    hostname: nominatim
    image: mediagis/nominatim:4.4
    profiles:
      - nom
    restart: unless-stopped
    shm_size: 1gb
    volumes:
      - nominatim-data:/var/lib/postgresql/14/main
      - nominatim-cache:/nominatim/cache
      - ./map/:/nominatim/data/

  # Wiki container
  wiki:
    container_name: ${COMPOSE_PROJECT_NAME}-wiki
    depends_on:
      init:
        condition: service_completed_successfully
      wiki-db:
        condition: service_started
    env_file:
      - .env.wiki
    secrets:
      - bookstack_session_secret
      - bookstack_database_password
      - bookstack_keycloak_client_secret
    hostname: wiki
    image: lscr.io/linuxserver/bookstack:25.11.5
    profiles:
      - wiki
    restart: unless-stopped
    volumes:
      - wiki-data:/config
      - wiki-storage:/storage
      - ./certs/:/etc/certs/:ro
      - ./wiki/init-wiki.sh:/custom-cont-init.d/init-wiki.sh:ro

  # Wiki database
  #
  # `MYSQL_ROOT_PASSWORD` / `MYSQL_PASSWORD` come in through `.env.wiki`.
  # The `_FILE` variants aren't forwarded here: setting them to empty
  # unconditionally (as the previous `environment:` block did) causes the
  # linuxserver/mariadb init to generate a random root password on first
  # boot, leaving root unrecoverable. Operators who want secret-file
  # indirection should invoke compose with
  # `--env-file docker/.env.secrets.docker` (generated by secrets.sh) so
  # the `_FILE` vars reach this service only when they point at real files.
  wiki-db:
    container_name: ${COMPOSE_PROJECT_NAME}-wiki-db
    env_file:
      - .env.wiki
    hostname: wiki-db
    image: lscr.io/linuxserver/mariadb:11.4.8
    secrets:
      - bookstack_root_password
      - bookstack_database_password
    profiles:
      - wiki
    restart: unless-stopped
    volumes:
      - wiki-data:/config

  # Keycloak for single sign-on
  keycloak:
    build:
      context: ./keycloak
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: ${COMPOSE_PROJECT_NAME}-keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    env_file:
      - .env.keycloak
    environment:
      KEYCLOAK_ADMIN_PASSWORD_FILE: ${KEYCLOAK_ADMIN_PASSWORD_FILE:-}
      KC_DB_PASSWORD_FILE: ${KC_DB_PASSWORD_FILE:-}
    secrets:
      - keycloak_admin_password
      - keycloak_database_password
      - keycloak_client_secret
    hostname: keycloak
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/keycloak:${TAG}
    labels:
      - traefik.enable=true
      - traefik.http.services.keycloak.loadbalancer.server.port=8080
      - traefik.http.middlewares.keycloak-security.headers.browserXssFilter=true
      - traefik.http.middlewares.keycloak-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.keycloak-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.keycloak-security.headers.frameDeny=false
      - traefik.http.middlewares.keycloak-security.headers.referrerPolicy=same-origin
      - traefik.http.middlewares.keycloak-security.headers.sslRedirect=true
      - traefik.http.middlewares.keycloak-security.headers.stsSeconds=31536000
      - traefik.http.routers.keycloak-http.entrypoints=web
      - traefik.http.routers.keycloak-http.rule=Host(`${APP_HOSTNAME}`) && (PathPrefix(`/auth/sso/js/`) || PathPrefix(`/auth/sso/realms/`) || PathPrefix(`/auth/sso/resources/`) || PathPrefix(`/auth/sso/robots.txt`))
      - traefik.http.routers.keycloak-http.middlewares=keycloak-https
      - traefik.http.middlewares.keycloak-https.redirectscheme.scheme=https
      - traefik.http.routers.keycloak.entrypoints=websecure
      - traefik.http.routers.keycloak.rule=Host(`${APP_HOSTNAME}`) && (PathPrefix(`/auth/sso/js/`) || PathPrefix(`/auth/sso/realms/`) || PathPrefix(`/auth/sso/resources/`) || PathPrefix(`/auth/sso/robots.txt`))
      - traefik.http.routers.keycloak.middlewares=keycloak-security
      - traefik.http.routers.keycloak.tls=true
      - traefik.http.routers.keycloak.tls.certresolver=${CERT_RESOLVER}
      - traefik.http.routers.keycloak-admin.entrypoints=websecure
      - traefik.http.routers.keycloak-admin.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/auth/sso/admin/`)
      - traefik.http.routers.keycloak-admin.middlewares=keycloak-security
      - traefik.http.routers.keycloak-admin.tls=true
      - traefik.http.routers.keycloak-admin.tls.certresolver=${CERT_RESOLVER}
    profiles:
      - sso
    restart: unless-stopped
    volumes:
      - keycloak-cache:/opt/jboss/keycloak/standalone/data

  # Backup sidecar: polls the database for queued BackupRuns and executes
  # backup.sh against this compose project. Runs by default so the admin
  # UI's key management works out of the box; on first boot init-keys.sh
  # generates the age keypair and registers the BackupKey row.
  backup:
    build:
      context: ./backup
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: ${COMPOSE_PROJECT_NAME}-backup
    depends_on:
      init:
        condition: service_completed_successfully
      server:
        condition: service_healthy
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME}
      # The sidecar no longer talks to Postgres directly — every DB
      # operation goes through the server's internal /worker/backup REST
      # API. BACKUP_SERVER_URL is the compose-internal address the
      # worker uses; the shared worker token is read via the same
      # precedence as other secrets (docker secret > _FILE env >
      # env var), so WORKER_TOKEN here is an env-var fallback for
      # dev runs where secrets.sh hasn't been run.
      BACKUP_SERVER_URL: http://server:3000
      WORKER_TOKEN: ${WORKER_TOKEN:-}
      # Workspace is the repo root, mounted read-only except for the staging dir.
      BACKUP_WORKSPACE: /workspace
      BACKUP_STAGING_DIR: /var/lib/backup/staging
      # Transient archive location (written before upload, kept as a local
      # cache when a local/share destination is configured). Distinct from
      # /var/lib/backup/archives so it cannot collide with a local
      # destination output path.
      BACKUP_ARCHIVE_DIR: /var/lib/backup/pending
      BACKUP_LOG_FILE: /var/lib/backup/backup.log
      # Where init-keys.sh persists the age keypair (host-mounted directory).
      # BACKUP_AGE_RECIPIENT and BACKUP_AGE_IDENTITY are exported by
      # entrypoint.sh after init-keys.sh has ensured these files exist.
      BACKUP_SECRETS_DIR: /host-secrets
    hostname: backup
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/backup:${TAG}
    restart: unless-stopped
    user: root:root
    secrets:
      - worker_token
    tmpfs:
      # uid/gid match the node user in the backup image so the worker (which
      # drops to node via su-exec in entrypoint.sh) can write here without
      # relying on the entrypoint's best-effort chown.
      - /var/lib/backup/staging:mode=0700,uid=1000,gid=1000
      - /var/lib/backup/pending:mode=0700,uid=1000,gid=1000
    volumes:
      # Repo root (compose file + scripts + libs) read-only.
      - ../:/workspace:ro
      # Allow the sidecar to call `docker compose` against the running project
      # so it can exec into db containers and run volume backup helpers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Writable staging + log area.
      - backup-data:/var/lib/backup
      # Local default destination; operators can mount a share/NFS here.
      - ./backups:/var/lib/backup/archives
      # Host-side secrets directory where init-keys.sh persists the age
      # keypair on first boot (idempotent; skipped if files already exist).
      # Must be writable; contents are the ONLY way to decrypt archives.
      - ./secrets/backup:/host-secrets

  # Keycloak database
  keycloak-db:
    cap_add:
      - SYS_NICE
    container_name: ${COMPOSE_PROJECT_NAME}-keycloak-db
    env_file:
      - .env.keycloak
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-${KEYCLOAK_DATABASE_PASSWORD}}
      POSTGRES_PASSWORD_FILE: ${KC_DB_POSTGRES_PASSWORD_FILE:-}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 10s
      retries: 10
    hostname: keycloak-db
    image: postgres:16-alpine
    profiles:
      - sso
    restart: unless-stopped
    secrets:
      - keycloak_database_password
    volumes:
      - keycloak-data:/var/lib/postgresql/data

  # Creates Grafana dashboard configurations
  grafana-setup:
    container_name: ${COMPOSE_PROJECT_NAME}-grafana-setup
    depends_on:
      grafana:
        condition: service_healthy
      keycloak:
        condition: service_started
        required: false
    environment:
      - SETUP_MODE=grafana
    env_file:
      - .env.grafana
    hostname: grafana-setup
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/setup:${TAG}
    profiles:
      - grafana
    restart: no
    volumes:
      - ./.env.grafana:/home/aems-app/docker/.env.grafana:ro
      - grafana-setup:/home/user/setup/

  # Grafana
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: ${COMPOSE_PROJECT_NAME}-grafana
    depends_on:
      certs:
        condition: service_completed_successfully
      grafana-db:
        condition: service_started
    env_file:
      - .env.grafana
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    hostname: grafana
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/grafana:${TAG}
    labels:
      - traefik.enable=true
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - traefik.http.middlewares.grafana-security.headers.browserXssFilter=true
      - traefik.http.middlewares.grafana-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.grafana-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.grafana-security.headers.frameDeny=true
      - traefik.http.middlewares.grafana-security.headers.referrerPolicy=same-origin
      - traefik.http.middlewares.grafana-security.headers.sslRedirect=true
      - traefik.http.middlewares.grafana-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.grafana-stripprefix.stripprefix.prefixes=/grafana
      - traefik.http.routers.grafana-http.entrypoints=web
      - traefik.http.routers.grafana-http.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/grafana`)
      - traefik.http.routers.grafana-http.middlewares=grafana-https
      - traefik.http.middlewares.grafana-https.redirectscheme.scheme=https
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.rule=Host(`${APP_HOSTNAME}`) && PathPrefix(`/grafana`)
      - traefik.http.routers.grafana.middlewares=grafana-security
      - traefik.http.routers.grafana.priority=100
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=${CERT_RESOLVER}
    profiles:
      - grafana
    restart: unless-stopped
    user: root
    volumes:
      - grafana-cache:/var/lib/grafana
      - certs-data:/etc/certs/:ro

  # Grafana database
  grafana-db:
    container_name: ${COMPOSE_PROJECT_NAME}-grafana-db
    env_file:
      - .env.grafana
    hostname: grafana-db
    image: postgres:16-alpine
    profiles:
      - grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/postgresql/data

  # Historian database
  historian:
    build:
      context: ./historian
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: ${COMPOSE_PROJECT_NAME}-historian
    depends_on:
      certs:
        condition: service_completed_successfully
    env_file:
      - .env.historian
    environment:
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}
      - POSTGRES_PASSWORD=${HISTORIAN_DATABASE_PASSWORD}
      - TEST_HISTORIAN_HOST=${TEST_HISTORIAN_HOST:-}
      - TEST_HISTORIAN_PASSWORD=${TEST_HISTORIAN_PASSWORD:-}
    hostname: historian
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/historian:${TAG}
    ports:
      - ${HISTORIAN_DB_PORT}:5432
    profiles:
      - volttron
      - fastapi
    restart: unless-stopped
    volumes:
      - historian-data:/var/lib/postgresql/data
      - certs-data:/etc/certs/:ro
      - ./historian/setup-subscriber.sh:/docker-entrypoint-initdb.d/setup-subscriber.sh:ro

  # Creates Volttron configurations on startup
  volttron-setup:
    build:
      context: ../../aems-edge
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: ${COMPOSE_PROJECT_NAME}-volttron-setup
    environment:
      - SETUP_MODE=volttron
    env_file:
      - .env.volttron
    hostname: volttron-setup
    network_mode: host
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/setup:${TAG}
    restart: no
    volumes:
      - ./.env.volttron:/home/aems-app/docker/.env.volttron:ro
      - volttron-setup:/home/user/setup/
      - ./volttron/setup/:/home/user/volttron/

  # Creates FastAPI agent configurations on startup
  fastapi-setup:
    build:
      context: ../../aems-edge
      dockerfile: ./Dockerfile
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: ${COMPOSE_PROJECT_NAME}-fastapi-setup
    environment:
      - SETUP_MODE=fastapi
    env_file:
      - .env.volttron
    hostname: fastapi-setup
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/setup:${TAG}
    profiles:
      - fastapi
    restart: "no"
    volumes:
      - fastapi-setup:/home/user/setup/
      - ./fastapi/setup/:/home/user/volttron/

  # Volttron - runs on host network for direct access
  volttron:
    container_name: ${COMPOSE_PROJECT_NAME}-volttron
    depends_on:
      certs:
        condition: service_completed_successfully
      volttron-setup:
        condition: service_completed_successfully
    environment:
      - TZ=${VOLTTRON_TIMEZONE:-UTC}
    env_file:
      - .env.volttron
    hostname: volttron
    image: eclipsevolttron/volttron-aems-ilc
    network_mode: host
    profiles:
      - volttron
    pull_policy: always
    restart: unless-stopped
    volumes:
      - volttron-data:/home/volttron/db
      - volttron-home:/home/volttron/.volttron/configuration_store/
      - volttron-manager:/home/volttron/.manager/
      - ./volttron/setup/configs/:/home/volttron/configurations/
      - ./volttron/setup/configs/platform_config.yml:/platform_config.yml
      - ./volttron/logs/:/home/volttron/logs/

  # FastAPI AEMS server
  aems-fastapi-server:
    build:
      context: ../../aems-lib-fastapi
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME}-aems-fastapi-server
    depends_on:
      init:
        condition: service_completed_successfully
      fastapi-setup:
        condition: service_completed_successfully
    env_file:
      - .env.aems-fastapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    hostname: aems-fastapi-server
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/aems-fastapi:${TAG}
    ports:
      - ${AEMS_FASTAPI_TEST_PORT:-5410}:8000
    profiles:
      - fastapi
    restart: unless-stopped
    volumes:
      - aems-volttron-home:/var/volttron
      - ./fastapi/setup/:/app/site-config/:ro
      # Docker socket provides high-privilege access to the host Docker daemon.
      # Required for the FastAPI server to manage agent containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # FastAPI AEMS agents — all agents run in a single container
  aems-agents:
    command: ["bash", "/app/start-agents.sh"]
    container_name: ${COMPOSE_PROJECT_NAME}-aems-agents
    depends_on:
      aems-fastapi-server:
        condition: service_healthy
    env_file:
      - .env.aems-fastapi
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://aems-fastapi-server:8000/connections/platform.driver"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    hostname: aems-agents
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/aems-fastapi:${TAG}
    profiles:
      - fastapi-agents
    restart: unless-stopped
    volumes:
      - aems-volttron-home:/var/volttron
      - aems-agent-logs:/var/log/aems
      - ./fastapi/setup/:/app/site-config/:ro
      # Mount local NF driver fix (Write Priority empty string handling)
      - ../../aems-edge/Normal/nf/driver.py:/volttron-pnnl-aems/aems-edge/Normal/nf/driver.py:ro

  # Simulated RTU devices for development/testing
  sim-rtu:
    build:
      context: ../../sim-rtu
      dockerfile: ./Dockerfile
    command: ["--config", "configs/docker-accessible.yml"]
    container_name: ${COMPOSE_PROJECT_NAME}-sim-rtu
    hostname: sim-rtu
    image: ${COMPOSE_CONTAINER_REGISTRY}/${COMPOSE_PROJECT_NAME}/sim-rtu:${TAG}
    ports:
      - ${SIM_RTU_API_PORT:-8080}:8080
      - ${SIM_RTU_BACNET_PORT:-47808}:47808/udp
    profiles:
      - sim-rtu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  acme-data:
    driver: local
  certs-data:
    driver: local
  client-cache:
    driver: local
  file-upload:
    driver: local
  database-data:
    driver: local
  nominatim-cache:
    driver: local
  nominatim-data:
    driver: local
  wiki-data:
    driver: local
  wiki-storage:
    driver: local
  keycloak-cache:
    driver: local
  keycloak-data:
    driver: local
  volttron-setup:
    driver: local
  fastapi-setup:
    driver: local
  volttron-data:
    driver: local
  volttron-home:
    driver: local
  volttron-manager:
    driver: local
  grafana-setup:
    driver: local
  grafana-cache:
    driver: local
  grafana-data:
    driver: local
  historian-data:
    driver: local
  aems-volttron-home:
    driver: local
  aems-agent-logs:
  backup-data:
    driver: local
