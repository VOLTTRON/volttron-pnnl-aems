type Query {
  """Read a list of geographies at a specific location."""
  areaGeographies(area: GeographyGeoJson!): [Geography!]

  """Count the number of accounts."""
  countAccounts(where: AccountFilter): Int

  """Count the number of backup destinations."""
  countBackupDestinations(where: BackupDestinationFilter): Int

  """Count the number of backup keys."""
  countBackupKeys(where: BackupKeyFilter): Int

  """Count the number of backup policies."""
  countBackupPolicies(where: BackupPolicyFilter): Int

  """Count the number of backup runs."""
  countBackupRuns(where: BackupRunFilter): Int

  """Count the number of banners."""
  countBanners(where: BannerFilter): Int

  """Count the number of comments."""
  countComments(where: CommentFilter): Int

  """Count the number of feedbacks."""
  countFeedbacks(where: FeedbackFilter): Int

  """Count the number of files."""
  countFiles(where: FileFilter): Int

  """Count the number of geographies."""
  countGeographies(where: GeographyFilter): Int

  """Count the number of logs."""
  countLogs(where: LogFilter): Int

  """Count the number of user."""
  countUsers(where: UserFilter): Int

  """
  Enumerate backup-capable services, volumes, bind paths, and env files from the live workspace.
  """
  discoverBackupSources: BackupDiscovery

  """Group a list of accounts."""
  groupAccounts(aggregate: AccountAggregate, by: [AccountFields!]!, where: AccountFilter): [AccountGroupBy!]

  """Group a list of backup destinations."""
  groupBackupDestinations(aggregate: BackupDestinationAggregate, by: [BackupDestinationFields!]!, where: BackupDestinationFilter): [BackupDestinationGroupBy!]

  """Group a list of backup keys."""
  groupBackupKeys(aggregate: BackupKeyAggregate, by: [BackupKeyFields!]!, where: BackupKeyFilter): [BackupKeyGroupBy!]

  """Group a list of backup policies."""
  groupBackupPolicies(aggregate: BackupPolicyAggregate, by: [BackupPolicyFields!]!, where: BackupPolicyFilter): [BackupPolicyGroupBy!]

  """Group a list of backup runs."""
  groupBackupRuns(aggregate: BackupRunAggregate, by: [BackupRunFields!]!, where: BackupRunFilter): [BackupRunGroupBy!]

  """Group a list of banners."""
