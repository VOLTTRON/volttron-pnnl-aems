type Mutation {
  """
  Acknowledge that the backup encryption key has been securely stored offline.
  """
  acknowledgeBackupKey(id: String!): BackupKey

  """Request cancellation of an in-flight backup run."""
  cancelBackupRun(id: String!): BackupRun

  """Create a new account."""
  createAccount(create: AccountCreateInput!): Account

  """Create a new backup destination."""
  createBackupDestination(enabled: Boolean, name: String!, order: Int, output: String, sseKmsKeyId: String, sseMode: String, type: BackupDestinationType!): BackupDestination

  """Create a new banner."""
  createBanner(create: BannerCreateInput!): Banner

  """Create a new comment."""
  createComment(create: CommentCreateInput!): Comment

  """Create a new user."""
  createCurrent(create: CurrentCreateInput!): User

  """Create new feedback."""
  createFeedback(create: FeedbackCreateInput): Feedback

  """Create a local file record."""
  createFile(create: FileCreateInput!): File

  """Create a new log."""
  createLog(create: LogCreateInput!): Log

  """Create a new user."""
  createUser(create: UserCreateInput!): User

  """Delete the specified account."""
  deleteAccount(where: AccountUniqueFilter!): Account

  """
  Delete the archive file for a specific backup run destination. The DB record is retained so the run remains visible as an audit trail; only the archive file itself is removed.
  """
  deleteBackupArchive(runDestinationId: String!): BackupRunDestination

  """Delete a backup destination."""
  deleteBackupDestination(id: String!): BackupDestination

  """Delete the specified banner."""
  deleteBanner(where: BannerUniqueFilter!): Banner

  """Delete the specified comment."""
  deleteComment(where: CommentUniqueFilter!): Comment

  """Delete the currently logged in user."""
  deleteCurrent: User

  """Delete the specified feedback."""
  deleteFeedback(where: FeedbackUniqueFilter!): Feedback

  """Delete a local file record."""
  deleteFile(where: FileUniqueFilter!): File

  """Delete the specified log."""
  deleteLog(where: LogUniqueFilter!): Log

  """Delete the specified user."""
  deleteUser(where: UserUniqueFilter!): User

  """
  Return the private key material for an acknowledged BackupKey. Rate limited to one call per minute per user and audited via the Log service.
  """
  downloadBackupPrivateKey(id: String!): String

  """
  Rotate the active backup encryption key. Retires the current key (sets active=false, rotatedAt=now) and lets the sidecar worker generate a fresh keypair on its next poll. The old key row is retained so historical archives remain decryptable.
  """
  rotateBackupKey: BackupKey

  """
  Enqueue a manual backup run for immediate execution by the sidecar worker.
  """
  triggerBackupRun: BackupRun

  """Update the specified account."""
  updateAccount(update: AccountUpdateInput!, where: AccountUniqueFilter!): Account

  """Update a backup destination."""
  updateBackupDestination(enabled: Boolean, id: String!, name: String, order: Int, output: String, sseKmsKeyId: String, sseMode: String, type: BackupDestinationType): BackupDestination

  """Upsert the single BackupPolicy."""
  updateBackupPolicy(cron: String, enabled: Boolean, excludeEnvFiles: [String!], excludePaths: [String!], excludeServices: [String!], excludeVolumes: [String!], extraEnvFiles: [String!], retentionDays: Int): BackupPolicy

  """Update the specified banner."""
  updateBanner(update: BannerUpdateInput!, where: BannerUniqueFilter!): Banner

  """Update the specified comment."""
  updateComment(update: CommentUpdateInput!, where: CommentUniqueFilter!): Comment

  """Update the currently logged in user."""
  updateCurrent(update: CurrentUpdateInput!): User

  """Update the specified feedback status."""
  updateFeedback(update: FeedbackUpdateInput!, where: FeedbackUniqueFilter!): Feedback

  """Update a local file record."""
  updateFile(update: FileUpdateInput!, where: FileUniqueFilter!): File

  """Update the specified log."""
  updateLog(update: LogUpdateInput!, where: LogUniqueFilter!): Log

  """Update the specified user."""
  updateUser(update: UserUpdateInput!, where: UserUniqueFilter!): User
}

enum MutationType {
  create
  delete
  update
}

enum OrderBy {
  Asc
  Desc
}

