    id
    algorithm
    publicKey
    fingerprint
    active
    acknowledged
    acknowledgedAt
    acknowledgedById
    rotatedAt
    createdAt
    updatedAt
    acknowledgedBy {
      id
      name
      email
    }
  }
}
